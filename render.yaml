services:
  - type: web
    name: debatemind
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PRO_MODEL
        value: qwen/qwen3-32b
      - key: AGAINST_MODEL
        value: llama-3.3-70b-versatile
      - key: FACT_MODEL
        value: qwen/qwen3.6-27b
      - key: JUDGE_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: MAX_RETRIES
        value: "3"
      - key: RETRY_WAIT_MIN
        value: "1"
      - key: RETRY_WAIT_MAX
        value: "8"
